<div class="app-container">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <header class="section-title">
      <h1>Settings</h1>
      <p style="font-size: 1rem; color: var(--text-dim); margin-top: 5px;">Manage your profile and application preferences.</p>
    </header>
    
    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 24px;" *ngIf="state$ | async as state">
      <div class="glass-card">
        <h3 style="margin-bottom: 20px;">User Profile</h3>
        <form [formGroup]="profileForm" (ngSubmit)="handleProfileSubmit()">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" formControlName="name" class="form-control">
          </div>
          <button type="submit" [disabled]="!profileForm.valid" class="btn-primary">Save Profile</button>
        </form>
      </div>

      <div class="glass-card">
        <h3 style="margin-bottom: 20px;">Appearance</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <label *ngFor="let t of themes" 
            [style.background]="state.theme === t.id ? 'var(--border-glass)' : 'transparent'"
            [style.border-color]="state.theme === t.id ? 'var(--primary-blue)' : 'var(--border-glass)'"
            style="display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid;">
            <input type="radio" name="theme" [checked]="state.theme === t.id" (change)="handleThemeChange(t.id)" style="accent-color: var(--primary-blue);">
            <div [style.background]="t.color" style="width: 20px; height: 20px; border-radius: 50%; border: 1px solid #666;"></div>
            <span>{{t.name}}</span>
          </label>
        </div>
      </div>
      
      <div class="glass-card">
        <h3 style="margin-bottom: 20px;">Danger Zone</h3>
        <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px;">
          This action will clear all your transaction history and budget settings. This cannot be undone.
        </p>
        <button (click)="handleReset()" style="width: 100%; padding: 14px; background: #ff4d4d; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
          Reset All Data
        </button>
      </div>
    </div>
  </main>
</div>
